site_name: Thumbnail Study
site_description: Methods and analysis for thumbnail study publication

nav:
  - Home: index.md
  - Methods: methods.md
  - Data: data.md
  - Results: results.md

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - toc.follow
    - toc.integrate
  palette:
    - scheme: default
      primary: teal
      accent: amber
  font:
    text: Source Serif 4
    code: JetBrains Mono

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 1-3

plugins:
  - search
